<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ArtBrand Premium</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet"><style>
:root{--bg:#0D0D0D;--card:#161616;--gold:#C8A96A;--text:#fff;--muted:#aaa;}
body{margin:0;background:var(--bg);color:var(--text);font-family:'Inter';}
header{display:flex;justify-content:space-between;align-items:center;padding:20px 50px;border-bottom:1px solid #222;position:sticky;top:0;background:rgba(13,13,13,0.9);backdrop-filter:blur(10px);}
h1{font-family:'Playfair Display';}
nav a{margin:0 15px;color:var(--muted);text-decoration:none;}
.hero{height:80vh;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;animation:fadeIn 2s;}
.hero h2{font-size:50px;font-family:'Playfair Display';}
.gallery{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:25px;padding:60px;}
.card{background:var(--card);padding:15px;border-radius:16px;transition:.4s;opacity:0;transform:translateY(30px);} 
.card.show{opacity:1;transform:translateY(0);} 
.card:hover{transform:scale(1.03);} 
.card img{width:100%;border-radius:12px;}
button{background:var(--gold);border:none;padding:10px 15px;margin-top:10px;cursor:pointer;border-radius:6px;}
.story,.reviews{padding:80px 40px;text-align:center;max-width:900px;margin:auto;}
.footer{padding:40px;text-align:center;border-top:1px solid #222;color:#888;}
#adminPanel{display:none;position:fixed;right:20px;top:80px;background:#111;padding:20px;border-radius:12px;width:300px;}
input,textarea{width:100%;padding:10px;margin:8px 0;background:#1a1a1a;border:none;color:white;border-radius:6px;}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
</style></head><body>
<header>
<h1>ArtBrand</h1>
<nav>
<a href="#">Home</a>
<a href="#gallery">Gallery</a>
<a href="#story">Story</a>
<a href="#reviews">Reviews</a>
</nav>
<button onclick="toggleAdmin()">⚙️</button>
</header><section class="hero">
<h2>Art that Speaks</h2>
<p>Minimal. Timeless. Collectible.</p>
</section><section class="gallery" id="gallery"></section><section class="story" id="story">
<h2>Brand Story</h2>
<p>Minimalism meets emotion in every piece.</p>
</section><section class="reviews" id="reviews">
<h2>Client Reviews</h2>
<div id="reviewList"></div>
<input id="rname" placeholder="Your Name">
<textarea id="rmsg" placeholder="Your Review"></textarea>
<button onclick="addReview()">Submit</button>
</section><div id="adminPanel">
<h3>Admin Login</h3>
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">
<button onclick="login()">Login</button>
<hr>
<h3>Add Artwork</h3>
<input id="title" placeholder="Title">
<input id="price" placeholder="Price">
<input id="image" placeholder="Image URL">
<button onclick="addArt()">Upload</button>
</div><footer class="footer">
<p>© 2026 ArtBrand</p>
</footer><script src="https://checkout.razorpay.com/v1/checkout.js"></script><script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-firestore.js";
import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-auth.js";

const firebaseConfig={apiKey:"YOUR_KEY",authDomain:"YOUR_DOMAIN",projectId:"YOUR_PROJECT"};
const app=initializeApp(firebaseConfig);
const db=getFirestore(app);
const auth=getAuth(app);

window.toggleAdmin=()=>{
 adminPanel.style.display=adminPanel.style.display==='block'?'none':'block';
}

window.login=async()=>{
 try{
  await signInWithEmailAndPassword(auth,email.value,password.value);
  alert('Login successful');
 }catch(e){alert('Login failed');}
}

window.addArt=async()=>{
 await addDoc(collection(db,'artworks'),{t:title.value,p:price.value,i:image.value});
 loadArt();
}

async function loadArt(){
 const snap=await getDocs(collection(db,'artworks'));
 gallery.innerHTML='';
 snap.forEach(doc=>{
  const d=doc.data();
  gallery.innerHTML+=`<div class='card'>
  <img src='${d.i}'>
  <h3>${d.t}</h3>
  <p>₹${d.p}</p>
  <button onclick="pay('${d.t}',${d.p})">Buy</button>
  </div>`;
 });
 animateCards();
}

function pay(name,price){
 var options={
  key:"YOUR_RAZORPAY_KEY",
  amount:price*100,
  currency:"INR",
  name:"ArtBrand",
  description:name,
  handler:function(){alert('Payment Successful');}
 };
 var rzp=new Razorpay(options);
 rzp.open();
}

window.addReview=async()=>{
 await addDoc(collection(db,'reviews'),{n:rname.value,m:rmsg.value});
 loadReviews();
}

async function loadReviews(){
 const snap=await getDocs(collection(db,'reviews'));
 reviewList.innerHTML='';
 snap.forEach(doc=>{
  const d=doc.data();
  reviewList.innerHTML+=`<p><strong>${d.n}</strong>: ${d.m}</p>`;
 });
}

function animateCards(){
 document.querySelectorAll('.card').forEach((c,i)=>{
  setTimeout(()=>c.classList.add('show'),i*100);
 });
}

loadArt();
loadReviews();
</script></body>
</html>
