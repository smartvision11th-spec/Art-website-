<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Arté — Premium Art Store</title><link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet"><script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "YOUR_DOMAIN",
  projectId: "YOUR_PROJECT_ID"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

window.db = db;
window.auth = auth;
window.firebaseFns = { collection, addDoc, onSnapshot, signInWithEmailAndPassword, onAuthStateChanged, signOut };
</script><script src="https://checkout.razorpay.com/v1/checkout.js"></script><style>
:root{--bg:#F8F8F8;--text:#111;--accent:#D6BFA7}
body{margin:0;font-family:'Inter',sans-serif;background:var(--bg);color:var(--text)}
h1,h2,h3{font-family:'Playfair Display',serif}

.navbar{position:sticky;top:0;background:#fff;display:flex;justify-content:space-between;padding:18px 40px;border-bottom:1px solid #eee}
.nav-links a{margin-left:25px;text-decoration:none;color:#111;font-size:14px}

.hero{text-align:center;padding:120px 20px;animation:fade 1s}

.gallery{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:40px;padding:60px}
.card{background:#fff;padding:15px;border-radius:10px;transition:.3s}
.card:hover{transform:translateY(-5px);box-shadow:0 20px 40px rgba(0,0,0,.08)}
.card img{width:100%;border-radius:8px}

button{background:var(--accent);border:none;padding:10px 18px;border-radius:20px;cursor:pointer;margin:5px}

.section{text-align:center;padding:80px 20px;max-width:800px;margin:auto}
.review-card{background:#fff;padding:15px;border-radius:10px;margin:10px auto;max-width:500px}

input,textarea{width:100%;padding:12px;margin:8px 0;border:1px solid #ddd;border-radius:6px}

.admin-panel{position:fixed;right:20px;bottom:20px;background:#fff;padding:15px;border-radius:12px;box-shadow:0 10px 30px rgba(0,0,0,.1);display:none;width:260px}
.toggle-admin{position:fixed;left:20px;bottom:20px;background:#111;color:#fff;padding:10px 15px;border-radius:20px;cursor:pointer}

footer{text-align:center;padding:30px;font-size:12px;color:#777}
@keyframes fade{from{opacity:0}to{opacity:1}}
</style></head>
<body><div class="navbar">
  <div>Arté</div>
  <div class="nav-links">
    <a href="#">Home</a>
    <a href="#gallery">Gallery</a>
    <a href="#reviews">Reviews</a>
  </div>
</div><section class="hero">
  <h1>Art that Speaks</h1>
  <p>Minimal. Timeless. Collectible.</p>
</section><section id="gallery" class="gallery"></section><section id="reviews" class="section">
  <h2>Reviews</h2>
  <input id="name" placeholder="Your Name">
  <textarea id="review" placeholder="Your Review"></textarea>
  <button onclick="addReview()">Submit</button>
  <div id="reviewList"></div>
</section><div class="toggle-admin" onclick="toggleAdmin()">Admin</div><div class="admin-panel" id="adminPanel">
  <h3>Admin Panel</h3>
  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">
  <button onclick="login()">Login</button>  <hr>
  <h4>Add Artwork</h4>
  <input id="title" placeholder="Title">
  <input id="price" placeholder="Price">
  <input id="image" placeholder="Image URL">
  <button onclick="addArtwork()">Add</button><button onclick="logout()">Logout</button>

</div><footer>© 2026 Arté</footer><script>
const { collection, addDoc, onSnapshot, signInWithEmailAndPassword, onAuthStateChanged, signOut } = window.firebaseFns;
const db = window.db;
const auth = window.auth;
let isAdmin = false;

function toggleAdmin(){
  const p=document.getElementById('adminPanel');
  p.style.display = p.style.display==='block'?'none':'block';
}

function login(){
  signInWithEmailAndPassword(auth,email.value,password.value)
}

onAuthStateChanged(auth,(user)=>{
  if(user){isAdmin=true;alert('Admin Logged In')}
  else{isAdmin=false}
})

function logout(){signOut(auth)}

function addArtwork(){
  if(!isAdmin) return alert('Login first');
  addDoc(collection(db,'artworks'),{
    title:title.value,
    price:Number(price.value),
    image:image.value
  })
}

function loadArt(){
  onSnapshot(collection(db,'artworks'),snap=>{
    gallery.innerHTML='';
    snap.forEach(doc=>{
      const art=doc.data();
      gallery.innerHTML+=`<div class='card'>
        <img src='${art.image}'>
        <h3>${art.title}</h3>
        <p>₹${art.price}</p>
        <button onclick='buyOnline(${art.price})'>Pay Online</button>
        <button onclick='cashOnDelivery("${art.title}",${art.price})'>Cash on Delivery</button>
      </div>`;
    })
  })
}

function buyOnline(amount){
  const rzp=new Razorpay({
    key:'YOUR_RAZORPAY_KEY',
    amount:amount*100,
    currency:'INR',
    handler:()=>alert('Payment Successful')
  });
  rzp.open();
}

function cashOnDelivery(title,price){
  const name = prompt('Enter your name');
  const address = prompt('Enter delivery address');

  if(!name || !address) return alert('Cancelled');

  addDoc(collection(db,'orders'),{
    name,
    address,
    product:title,
    price,
    payment:'COD',
    status:'Pending'
  });

  alert('Order placed successfully (Cash on Delivery)');
}

function addReview(){
  addDoc(collection(db,'reviews'),{
    name:name.value,
    review:review.value
  })
}

function loadReviews(){
  onSnapshot(collection(db,'reviews'),snap=>{
    reviewList.innerHTML='';
    snap.forEach(doc=>{
      const r=doc.data();
      reviewList.innerHTML+=`<div class='review-card'><b>${r.name}</b><p>${r.review}</p></div>`;
    })
  })
}

loadArt();
loadReviews();
</script></body>
</html>
